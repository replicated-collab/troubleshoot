---
name: "Close stale issues"
on:
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * *"

jobs:
  stale:
    runs-on: ubuntu-latest
    outputs:
      issue_numbers: ${{ steps.extract_stale.outputs.issue_numbers }}
    steps:
      - id: stale
        uses: actions/stale@v10
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          operations-per-run: 150
          days-before-stale: 4
          days-before-close: 2
          stale-issue-message: "We noticed you haven't updated us in a few days. In order to troubleshoot this issue further, we need some additional information. Please review the last request and let us know if you need assistance collecting the requested data. In order to help ensure we can address ongoing issues effectively, we will archive this issue if we don't hear from you in the next 2 days."
          close-issue-message: "We haven't heard back for some time, so we are updating this case to keep our active support queue visible and manageable. If you are still experiencing this issue, please comment with the additional information requested above. If you experience a similar issue or see this reoccur, please open a new support case and reference this one for historical data."
          stale-issue-label: "status::inactive"
          close-issue-label: "status::closed"
          close-issue-reason: "completed"
          any-of-labels: "status::pending,status::inactive,status::stale"
          only-labels: "kind::inbound-escalation"
          exempt-issue-labels: "kind::bug,kind::feature-request"
          debug-only: false

      - name: Extract closed issue numbers (stale)
        id: extract_stale
        uses: actions/github-script@v8
        env:
          CLOSED_ISSUES_PRS_JSON: ${{ steps.stale.outputs.closed-issues-prs }}
        with:
          script: |
            const raw = String(process.env.CLOSED_ISSUES_PRS_JSON || '').trim();
            if (!raw) {
              core.setOutput('issue_numbers', '');
              return;
            }

            const arr = JSON.parse(raw);
            if (!Array.isArray(arr)) {
              throw new Error('closed-issues-prs JSON is not an array');
            }

            const numbers = arr.map(i => i.number).join(',');
            core.setOutput('issue_numbers', numbers);

  confirmation:
    runs-on: ubuntu-latest
    outputs:
      issue_numbers: ${{ steps.extract_confirmation.outputs.issue_numbers }}
    steps:
      - id: stale
        uses: actions/stale@v10
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          operations-per-run: 150
          days-before-stale: 2
          days-before-close: 0
          close-issue-message: "We haven't heard back since we confirmed a solution was delivered. We will update this case to keep our active queue visible. If you are still experiencing this issue, please comment with the additional information requested above. If you experience a similar issue, please open a new support case and reference this one for historical data."
          stale-issue-label: "status::inactive"
          close-issue-label: "status::closed"
          close-issue-reason: "completed"
          any-of-labels: "status::awaiting-confirmation"
          only-labels: "kind::inbound-escalation"
          exempt-issue-labels: "kind::bug,kind::feature-request"
          debug-only: false

      - name: Extract closed issue numbers (confirmation)
        id: extract_confirmation
        uses: actions/github-script@v8
        env:
          CLOSED_ISSUES_PRS_JSON: ${{ steps.stale.outputs.closed-issues-prs }}
        with:
          script: |
            const raw = String(process.env.CLOSED_ISSUES_PRS_JSON || '').trim();
            if (!raw) {
              core.setOutput('issue_numbers', '');
              return;
            }

            const arr = JSON.parse(raw);
            if (!Array.isArray(arr)) {
              throw new Error('closed-issues-prs JSON is not an array');
            }

            const numbers = arr.map(i => i.number).join(',');
            core.setOutput('issue_numbers', numbers);

  stale-hybrid-awaiting-confirmation:
    runs-on: ubuntu-latest
    outputs:
      issue_numbers: ${{ steps.extract.outputs.issue_numbers }}
    steps:
      - id: stale
        uses: actions/stale@v10
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          operations-per-run: 150
          days-before-stale: 2
          days-before-close: 0
          stale-issue-message: "This enhancement (or a workaround/alternative solution) has been delivered by our team and we are waiting for your feedback. We will archive this enhancement tracking issue as accepted if we don't hear from you in 2 days."
          close-issue-message: "We haven't heard back for some time, so we are updating this case to keep our active support queue visible and manageable. If you are still experiencing this issue, please comment with the additional information requested above. If you experience a similar issue or see this reoccur, please open a new support case and reference this one for historical data."
          stale-issue-label: "status::inactive"
          close-issue-label: "status::closed"
          close-issue-reason: "completed"
          only-labels: "kind::inbound-escalation,enhancements::awaiting-confirmation,status::awaiting-confirmation"
          any-of-labels: "kind::bug,kind::feature-request"
          debug-only: false
      - name: Extract closed issue numbers
        id: extract
        uses: actions/github-script@v8
        env:
          CLOSED_ISSUES_PRS_JSON: ${{ steps.stale.outputs.closed-issues-prs }}
        with:
          script: |
            const raw = String(process.env.CLOSED_ISSUES_PRS_JSON || '').trim();
            if (!raw) { core.setOutput('issue_numbers', ''); return; }
            const arr = JSON.parse(raw);
            if (!Array.isArray(arr)) throw new Error('closed-issues-prs JSON is not an array');
            core.setOutput('issue_numbers', arr.map(i => i.number).join(','));

  stale-hybrid-pending:
    runs-on: ubuntu-latest
    outputs:
      issue_numbers: ${{ steps.extract.outputs.issue_numbers }}
    steps:
      - id: stale
        uses: actions/stale@v10
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          operations-per-run: 150
          days-before-stale: 4
          days-before-close: 2
          stale-issue-message: "We noticed you haven't updated us in a few days. In order to troubleshoot this issue further, we need some additional information. Please review the last request and let us know if you need assistance collecting the requested data. In order to help ensure we can address ongoing issues effectively, we will archive this issue if we don't hear from you in the next 2 days."
          close-issue-message: "We haven't heard back on this tracked bug/feature request. We're updating this case to keep our active queue visible. If you're still experiencing this issue, please comment and we can reopen."
          stale-issue-label: "status::inactive"
          close-issue-label: "status::closed"
          close-issue-reason: "completed"
          only-labels: "kind::inbound-escalation,enhancements::awaiting-confirmation,status::pending"
          any-of-labels: "kind::bug,kind::feature-request"
          debug-only: false
      - name: Extract closed issue numbers
        id: extract
        uses: actions/github-script@v8
        env:
          CLOSED_ISSUES_PRS_JSON: ${{ steps.stale.outputs.closed-issues-prs }}
        with:
          script: |
            const raw = String(process.env.CLOSED_ISSUES_PRS_JSON || '').trim();
            if (!raw) { core.setOutput('issue_numbers', ''); return; }
            const arr = JSON.parse(raw);
            if (!Array.isArray(arr)) throw new Error('closed-issues-prs JSON is not an array');
            core.setOutput('issue_numbers', arr.map(i => i.number).join(','));

  dispatch-followups:
    runs-on: ubuntu-latest
    needs:
      - stale
      - confirmation
      - stale-hybrid-awaiting-confirmation
      - stale-hybrid-pending
    if: always() && (needs.stale.outputs.issue_numbers != '' || needs.confirmation.outputs.issue_numbers != '' || needs.stale-hybrid-awaiting-confirmation.outputs.issue_numbers != '' || needs.stale-hybrid-pending.outputs.issue_numbers != '')
    steps:
      - name: Dispatch follow-up workflows for closed issues (combined)
        uses: actions/github-script@v8
        env:
          STALE_ISSUE_NUMBERS: ${{ needs.stale.outputs.issue_numbers }}
          CONFIRM_ISSUE_NUMBERS: ${{ needs.confirmation.outputs.issue_numbers }}
          HYBRID_AWAIT_ISSUE_NUMBERS: ${{ needs.stale-hybrid-awaiting-confirmation.outputs.issue_numbers }}
          HYBRID_PENDING_ISSUE_NUMBERS: ${{ needs.stale-hybrid-pending.outputs.issue_numbers }}
          DISPATCH_REF: ${{ github.ref }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            function parseIssueNumbersCsv(raw) {
              const s = String(raw || '').trim();
              if (!s) return [];
              return s
                .split(/[\s,]+/g)
                .map((x) => x.trim())
                .filter(Boolean)
                .map((x) => Number(x))
                .filter((n) => Number.isInteger(n) && n > 0);
            }

            const staleNums = parseIssueNumbersCsv(process.env.STALE_ISSUE_NUMBERS);
            const confirmNums = parseIssueNumbersCsv(process.env.CONFIRM_ISSUE_NUMBERS);
            const hybridAwaitNums = parseIssueNumbersCsv(process.env.HYBRID_AWAIT_ISSUE_NUMBERS);
            const hybridPendingNums = parseIssueNumbersCsv(process.env.HYBRID_PENDING_ISSUE_NUMBERS);
            const combined = Array.from(new Set([...staleNums, ...confirmNums, ...hybridAwaitNums, ...hybridPendingNums]));
            if (combined.length === 0) {
              console.log('No issue numbers found across stale+confirmation; nothing to dispatch.');
              return;
            }

            const issue_numbers = combined.join(',');
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const ref = String(process.env.DISPATCH_REF || '').trim() || context.ref;

            const workflows = [
              { workflow_id: 'trigger-followups.yml' }
            ];

            console.log('Dispatching follow-up workflows for closed issues/PRs:', issue_numbers);

            for (const w of workflows) {
              try {
                await github.rest.actions.createWorkflowDispatch({
                  owner,
                  repo,
                  workflow_id: w.workflow_id,
                  ref,
                  inputs: { issue_numbers }
                });
                console.log(`Dispatched ${w.workflow_id}`);
              } catch (error) {
                const message = error?.message || 'unknown error';
                const status = error?.status ? ` status=${error.status}` : '';
                console.log(`Failed to dispatch ${w.workflow_id} (${message}${status})`);
              }
            }

  stale-enhancements:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@v10
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          operations-per-run: 150
          days-before-stale: 0
          days-before-close: 2
          stale-issue-message: "This enhancement (or a workaround/alternative solution) has been delivered by our team and we are waiting for your feedback. We will archive this enhancement tracking issue as accepted if we don't hear from you in 2 days."
          close-issue-message: "We haven't heard back and are optimistic that indicates a solution has been delivered and is working as expected. As such, we will close this case today to increase visibility of active issues. If you are unable to validate this enhancement, please let us know by commenting and pressing the re-open button."
          stale-issue-label: "enhancements::inactive"
          close-issue-label: "enhancements::done"
          close-issue-reason: "completed"
          any-of-labels: "kind::feature-request,kind::bug"
          only-labels: "enhancements::awaiting-confirmation"
          exempt-issue-labels: "kind::inbound-escalation"
          debug-only: false
